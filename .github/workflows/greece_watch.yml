name: Greece Watch

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: greece-watch
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install httpx

      - name: Poll Polymarket and notify
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python greece_watch_once.py

      - name: Commit updated state
        run: |
          git config user.name "greece-watch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add greece_watch.sqlite3
          git diff --cached --quiet || git commit -m "state update"
          git push
